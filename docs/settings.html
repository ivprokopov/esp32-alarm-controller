<!doctype html>
<html lang="bg"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Алармена система · Настройки</title><style>
:root{--bg:#09111e;--card:#122035;--line:#2b4260;--txt:#edf5ff;--muted:#9aacbf}*{box-sizing:border-box}body{margin:0;background:#09111e;color:var(--txt);font:15px Arial}.app{max-width:1150px;margin:auto;padding:22px 14px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px}.top h1{margin:0}.top p{color:var(--muted);margin:5px 0 16px}.back,.tab,.btn{border:1px solid var(--line);background:#142744;color:#fff;border-radius:10px;padding:10px 12px;text-decoration:none;font-weight:bold;cursor:pointer}.tabs{display:flex;gap:8px;overflow:auto;margin-bottom:14px}.tab.active{background:#356ccc}.view{display:none}.view.active{display:block}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px}.card h2{margin:0 0 14px}.field{margin:10px 0}.field label{display:block;color:var(--muted);font-size:12px;margin-bottom:5px}input,select{width:100%;padding:11px;border-radius:8px;background:#081321;border:1px solid #365574;color:#fff}.check{display:inline-flex;gap:6px;align-items:center;margin:6px 10px 6px 0}.check input{width:auto}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.green{background:#238c50}.gray{background:#455367}.red{background:#b82b3b}.item{display:flex;justify-content:space-between;align-items:center;gap:10px;border-bottom:1px solid #263c58;padding:12px 0}.item:last-child{border:0}.meta{font-size:12px;color:var(--muted);margin-top:4px}.small{padding:8px 9px;font-size:12px}.note{background:#102844;border:1px solid #375f8f;border-radius:10px;padding:10px;color:#c8dcff;margin-bottom:12px}.toast{display:none;position:fixed;right:16px;bottom:16px;background:#173b29;border:1px solid #3e9a60;padding:12px;border-radius:10px}@media(max-width:760px){.grid{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}
</style></head><body><main class="app"><header class="top"><div><h1>⚙️ Алармена система</h1><p>Настройки на контролния панел</p></div><a class="back" href="./">← Контролен панел</a></header><div class="note">Всички налични зони се показват тук. Можеш да ги преименуваш, изключиш, изолираш или изтриеш.</div><nav class="tabs"><button class="tab active" data-tab="zones">Зони</button><button class="tab" data-tab="users">Потребители</button><button class="tab" data-tab="system">Системни настройки</button></nav>
<section id="zones" class="view active"><div class="grid"><form class="card" id="zoneForm"><h2 id="zoneTitle">Добави зона</h2><input id="zoneId" type="hidden"><div class="field"><label>Идентификатор</label><input id="zoneKey" placeholder="kitchen_window" required></div><div class="field"><label>Име на зона</label><input id="zoneName" placeholder="Кухненски прозорец" required></div><div class="field"><label>Тип</label><select id="zoneType"><option value="magnetic">Магнитен контакт</option><option value="pir">PIR датчик</option><option value="tamper">Тампер</option><option value="smoke">Дим / пожар</option><option value="water">Теч / вода</option><option value="other">Друго</option></select></div><div class="field"><label>Закъснение, сек.</label><input id="zoneDelay" type="number" min="0" max="300" value="0"></div><label class="check"><input id="zoneEnabled" type="checkbox" checked> Активна</label><label class="check"><input id="zoneBypassed" type="checkbox"> Изолирана</label><div><label class="check"><input id="modeFull" type="checkbox" checked> Пълен</label><label class="check"><input id="modeNight" type="checkbox"> Нощен</label><label class="check"><input id="modePerimeter" type="checkbox"> Периметър</label></div><div class="actions"><button class="btn green" type="submit">Запази зона</button><button class="btn gray" id="newZone" type="button">Нова зона</button></div></form><section class="card"><h2>Всички налични зони</h2><div id="zonesList"></div></section></div></section>
<section id="users" class="view"><div class="grid"><form class="card" id="userForm"><h2 id="userTitle">Добави потребител</h2><input id="userId" type="hidden"><div class="field"><label>Идентификатор</label><input id="userKey" required placeholder="ivaylo"></div><div class="field"><label>Име</label><input id="userName" required placeholder="Ивайло"></div><div class="field"><label>Роля</label><select id="userRole"><option value="admin">Администратор</option><option value="family">Семеен потребител</option><option value="limited">Ограничен достъп</option><option value="guest">Временен гост</option></select></div><label class="check"><input id="userActive" type="checkbox" checked> Активен</label><div><label class="check"><input id="rightArm" type="checkbox" checked> Въоръжаване</label><label class="check"><input id="rightDisarm" type="checkbox" checked> Разоръжаване</label><label class="check"><input id="rightDoor" type="checkbox" checked> Врата</label><label class="check"><input id="rightSettings" type="checkbox"> Настройки</label></div><div class="actions"><button class="btn green" type="submit">Запази потребител</button><button class="btn gray" id="newUser" type="button">Нов потребител</button></div></form><section class="card"><h2>Потребители и права</h2><div id="usersList"></div></section></div></section>
<section id="system" class="view"><form class="card" id="systemForm"><h2>Закъснения и поведение</h2><div class="grid"><div><div class="field"><label>Входно закъснение, сек.</label><input id="entryDelay" type="number" min="0" max="300"></div><div class="field"><label>Изходно закъснение, сек.</label><input id="exitDelay" type="number" min="0" max="300"></div></div><div><div class="field"><label>Сирена, сек.</label><input id="alarmTimeout" type="number" min="5" max="600"></div><div class="field"><label>Импулс за електромагнит, сек.</label><input id="lockPulse" type="number" min="1" max="10"></div></div></div><label class="check"><input id="openArmed" type="checkbox"> Разреши отваряне на врата при въоръжена система</label><div class="actions"><button class="btn green">Запази</button></div></form></section>
</main><div class="toast" id="toast"></div><script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';import{getDatabase,ref,onValue,set,remove}from'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';const db=getDatabase(initializeApp({databaseURL:'https://rfid-project-e68a3-default-rtdb.europe-west1.firebasedatabase.app/'})),ROOT='alarm_controller';const $=x=>document.getElementById(x);let cfg={system:{entry_delay_s:20,exit_delay_s:30,alarm_timeout_s:30,lock_pulse_s:3},zones:{},users:{}};const defaults={front_door:{name:'Входна врата',type:'magnetic',enabled:true,bypassed:false,entry_delay_s:20,modes:{full:true,night:true,perimeter:false}},yard_gate:{name:'Дворна врата',type:'magnetic',enabled:true,bypassed:false,entry_delay_s:0,modes:{full:true,night:false,perimeter:true}},garage:{name:'Гараж',type:'magnetic',enabled:true,bypassed:false,entry_delay_s:0,modes:{full:true,night:true,perimeter:false}},yard:{name:'Периметър / двор',type:'pir',enabled:true,bypassed:false,entry_delay_s:0,modes:{full:true,night:false,perimeter:true}}};function msg(t){toast.textContent=t;toast.style.display='block';setTimeout(()=>toast.style.display='none',2200)}function key(v){return v.trim().toLowerCase().replace(/[^a-z0-9_-]/g,'_')}function tabs(){document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));b.classList.add('active');$(b.dataset.tab).classList.add('active')})}function resetZone(){zoneId.value='';zoneKey.value='';zoneKey.disabled=false;zoneName.value='';zoneType.value='magnetic';zoneDelay.value=0;zoneEnabled.checked=true;zoneBypassed.checked=false;modeFull.checked=true;modeNight.checked=false;modePerimeter.checked=false;zoneTitle.textContent='Добави зона'}function editZone(id){let z=cfg.zones[id];zoneId.value=id;zoneKey.value=id;zoneKey.disabled=true;zoneName.value=z.name||'';zoneType.value=z.type||'other';zoneDelay.value=z.entry_delay_s||0;zoneEnabled.checked=z.enabled!==false;zoneBypassed.checked=!!z.bypassed;modeFull.checked=z.modes?.full!==false;modeNight.checked=!!z.modes?.night;modePerimeter.checked=!!z.modes?.perimeter;zoneTitle.textContent='Редакция на зона'}function renderZones(){let rows=Object.entries(cfg.zones);zonesList.innerHTML=rows.map(([id,z])=>`<div class="item"><div><b>${z.name||id}</b><div class="meta">${id} · ${z.type||'other'} · ${z.enabled===false?'изключена':z.bypassed?'изолирана':'активна'} · ${z.entry_delay_s||0} сек.</div></div><div class="actions"><button class="btn gray small" data-edit-zone="${id}">Редакция</button><button class="btn red small" data-delete-zone="${id}">Изтрий</button></div></div>`).join('')||'<p class="meta">Няма налични зони.</p>';document.querySelectorAll('[data-edit-zone]').forEach(b=>b.onclick=()=>editZone(b.dataset.editZone));document.querySelectorAll('[data-delete-zone]').forEach(b=>b.onclick=async()=>{if(confirm('Наистина ли да изтрия зоната?')){await remove(ref(db,`${ROOT}/config/zones/${b.dataset.deleteZone}`));msg('Зоната е изтрита')}})}function resetUser(){userId.value='';userKey.value='';userKey.disabled=false;userName.value='';userRole.value='family';userActive.checked=true;rightArm.checked=true;rightDisarm.checked=true;rightDoor.checked=true;rightSettings.checked=false;userTitle.textContent='Добави потребител'}function editUser(id){let u=cfg.users[id],r=u.rights||{};userId.value=id;userKey.value=id;userKey.disabled=true;userName.value=u.name||'';userRole.value=u.role||'family';userActive.checked=u.active!==false;rightArm.checked=!!r.arm;rightDisarm.checked=!!r.disarm;rightDoor.checked=!!r.open_door;rightSettings.checked=!!r.settings;userTitle.textContent='Редакция на потребител'}function renderUsers(){usersList.innerHTML=Object.entries(cfg.users).map(([id,u])=>`<div class="item"><div><b>${u.name||id}</b><div class="meta">${u.role||'family'} · ${u.active===false?'блокиран':'активен'}</div></div><div class="actions"><button class="btn gray small" data-edit-user="${id}">Редакция</button><button class="btn red small" data-delete-user="${id}">Изтрий</button></div></div>`).join('')||'<p class="meta">Няма потребители.</p>';document.querySelectorAll('[data-edit-user]').forEach(b=>b.onclick=()=>editUser(b.dataset.editUser));document.querySelectorAll('[data-delete-user]').forEach(b=>b.onclick=async()=>{if(confirm('Наистина ли да изтрия потребителя?')){await remove(ref(db,`${ROOT}/config/users/${b.dataset.deleteUser}`));msg('Потребителят е изтрит')}})}zoneForm.onsubmit=async e=>{e.preventDefault();let id=zoneId.value||key(zoneKey.value);if(!id)return alert('Въведи идентификатор');await set(ref(db,`${ROOT}/config/zones/${id}`),{name:zoneName.value.trim(),type:zoneType.value,enabled:zoneEnabled.checked,bypassed:zoneBypassed.checked,entry_delay_s:+zoneDelay.value,modes:{full:modeFull.checked,night:modeNight.checked,perimeter:modePerimeter.checked}});msg('Зоната е записана');resetZone()};userForm.onsubmit=async e=>{e.preventDefault();let id=userId.value||key(userKey.value);if(!id)return alert('Въведи идентификатор');await set(ref(db,`${ROOT}/config/users/${id}`),{name:userName.value.trim(),role:userRole.value,active:userActive.checked,rights:{arm:rightArm.checked,disarm:rightDisarm.checked,open_door:rightDoor.checked,settings:rightSettings.checked}});msg('Потребителят е записан');resetUser()};systemForm.onsubmit=async e=>{e.preventDefault();await set(ref(db,`${ROOT}/config/system`),{entry_delay_s:+entryDelay.value,exit_delay_s:+exitDelay.value,alarm_timeout_s:+alarmTimeout.value,lock_pulse_s:+lockPulse.value,allow_open_when_armed:openArmed.checked});msg('Настройките са записани')};newZone.onclick=resetZone;newUser.onclick=resetUser;onValue(ref(db,`${ROOT}/config`),s=>{let d=s.val()||{};cfg.system={...cfg.system,...(d.system||{})};cfg.zones={...defaults,...(d.zones||{})};cfg.users=d.users||{};entryDelay.value=cfg.system.entry_delay_s??20;exitDelay.value=cfg.system.exit_delay_s??30;alarmTimeout.value=cfg.system.alarm_timeout_s??30;lockPulse.value=cfg.system.lock_pulse_s??3;openArmed.checked=!!cfg.system.allow_open_when_armed;renderZones();renderUsers()});tabs();resetZone();resetUser();
</script></body></html>
